name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/GAManager.Web/package-lock.json

      - name: Install Web dependencies
        run: npm ci
        working-directory: src/GAManager.Web

      - name: Lint Web
        run: npm run lint
        working-directory: src/GAManager.Web

      - name: Test Web
        run: npm run test
        working-directory: src/GAManager.Web

      - name: Restore
        run: dotnet restore GAManager.sln

      - name: Build
        run: dotnet build GAManager.sln -c Release --no-restore
